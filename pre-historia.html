<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <title>PRÉ-HISTÓRIA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css">
    <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
    
    #track-message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #004aadff;
      color: #ffffff;
      font-family: 'Changa One', sans-serif;
      font-size: 1em;
      padding: 10px 20px;
      border-radius: 8px;
      text-align: center; 
      z-index: 9999;
    }

    .hidden {
      display: none !important;
    }

    /* BOTÃO DE ÁUDIO */

    .audio-btn{
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background:#00e5ff;
      color:#000;
      padding:12px 20px;
      border-radius:10px;
      font-size:16px;
      font-weight:bold;
      border:none;
      z-index:9999;
      display:none;
      cursor:pointer;
    }

    </style>    
  </head>

  <body>
    
    <!-- 🔹 Mensagem de foco no track -->
    <div id="track-message">
      Aponte a câmera para o marcador!
    </div>

    <!-- BOTÃO AUDIO -->
    <button id="audioButton" class="audio-btn">
      ▶ Ouvir explicação
    </button>

    <!-- AUDIOS -->
    <audio id="audio0" src="Audios/audio1.mp3"></audio>
    <audio id="audio1" src="Audios/audio2.mp3"></audio>
    <audio id="audio2" src="Audios/audio3.mp3"></audio>
    <audio id="audio3" src="Audios/audio4.mp3"></audio>
    <audio id="audio4" src="Audios/audio5.mp3"></audio>
    <audio id="audio5" src="Audios/audio6.mp3"></audio>
    <audio id="audio6" src="Audios/audio7.mp3"></audio>
    <audio id="audio7" src="Audios/audio8.mp3"></audio>
    <audio id="audio8" src="Audios/audio9.mp3"></audio>

    <!-- Cena AR -->
    <a-scene mindar-image="imageTargetSrc: Imagens/targets.mind; filterMinCF: 0.0001; 
              filterBeta: 0.05;
              missTolerance: 5;
              warmupTolerance: 4;" 
             color-space="sRGB" 
             renderer="colorManagement: true, physicallyCorrectLights" 
             xr-mode-ui="enabled: false" 
             device-orientation-permission-ui="enabled: false">

      <a-assets>
        <a-asset-item id="objeto1" src="Modelos/objeto1.glb"></a-asset-item>
        <a-asset-item id="objeto2" src="Modelos/objeto2.glb"></a-asset-item>
        <a-asset-item id="objeto3" src="Modelos/objeto3.glb"></a-asset-item>
        <a-asset-item id="objeto4" src="Modelos/objeto4.glb"></a-asset-item>
        <a-asset-item id="objeto5" src="Modelos/objeto5.glb"></a-asset-item>
        <a-asset-item id="objeto6" src="Modelos/objeto6.glb"></a-asset-item>
        <a-asset-item id="objeto7" src="Modelos/objeto7.glb"></a-asset-item>
        <a-asset-item id="objeto8" src="Modelos/objeto8.glb"></a-asset-item>
        <a-asset-item id="objeto9" src="Modelos/objeto9.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- O PLEISTOCENO 1 -->
      <a-entity mindar-image-target="targetIndex: 0">

        <a-gltf-model 
          rotation="90 0 0 " position="0 0 0" scale="0.8 0.8 0.8" src="#objeto1">
        </a-gltf-model>

        <a-entity position="0 1.8 0" rotation="90 0 0 ">

          <a-text
            value="PLEISTOCENO"
            align="center"
            color="#00e5ff"
            width="3"
            position="0 0.25 0">
          </a-text>          

          <a-text
            value="2,6 milhões – 11.700 anos"
            align="center"
            color="#ffffff"
            width="3"
            position="0 0 0">
          </a-text>         

        </a-entity>

      </a-entity>
      
      <!-- O PALEOLÍTICO 2 -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto2"></a-gltf-model>
      </a-entity>

      <!-- A MEGAFAUNA 3 -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto3"></a-gltf-model>
      </a-entity>
 
      <!-- O HOMO SAPIENS 4 -->
      <a-entity mindar-image-target="targetIndex: 3">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto4"></a-gltf-model>
      </a-entity>
      
      <!-- NOMADISMO 5 -->
      <a-entity mindar-image-target="targetIndex: 4">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto5"></a-gltf-model>
      </a-entity>
      
      <!-- TECNOLOGIA E FOGO 6 -->
      <a-entity mindar-image-target="targetIndex: 5">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto6"></a-gltf-model>
      </a-entity> 

      <!-- ARTE RUPESTRE 7 -->
      <a-entity mindar-image-target="targetIndex: 6">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto7"></a-gltf-model>
      </a-entity> 
      
      <!-- MESOLÍTICO 8 -->
      <a-entity mindar-image-target="targetIndex: 7">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto8"></a-gltf-model>
      </a-entity>  
      
      <!-- NEOLÍTICO 9 -->
      <a-entity mindar-image-target="targetIndex: 8">
        <a-gltf-model rotation="0 0 0 " position="0 -0.25 0" scale="0.05 0.05 0.05" src="#objeto9"></a-gltf-model>
      </a-entity>  

    </a-scene>

<script>

const message = document.getElementById("track-message");
const audioButton = document.getElementById("audioButton");

let currentAudio = null;

// pega todos os marcadores
const targets = document.querySelectorAll('[mindar-image-target]');

targets.forEach((target, index) => {

  target.addEventListener("targetFound", () => {

    message.classList.add("hidden");

    audioButton.style.display = "block";

    currentAudio = document.getElementById("audio" + index);

  });

  target.addEventListener("targetLost", () => {

    audioButton.style.display = "none";

    message.classList.remove("hidden");

    if(currentAudio){
      currentAudio.pause();
      currentAudio.currentTime = 0;
    }

  });

});

// tocar áudio quando clicar
audioButton.addEventListener("click", () => {

  if(currentAudio){

    // parar todos os outros áudios
    document.querySelectorAll("audio").forEach(a => {
      a.pause();
      a.currentTime = 0;
    });

    currentAudio.play().catch(err=>{
      console.log("Erro ao tocar áudio:", err);
    });

  }

});

</script>

  </body>
</html>
